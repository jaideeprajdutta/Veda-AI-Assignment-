# Build + deploy the web image on every push to main.
# Triggered by Cloud Build when apps/web/** or packages/shared/** changes.
#
# NEXT_PUBLIC_* are baked at build time, so the api URL is passed in as a
# build arg via the _API_URL substitution (defaulted below).
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_API_URL}
      - --build-arg
      - NEXT_PUBLIC_WS_URL=${_API_URL}
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/vedaai/web:$SHORT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/vedaai/web:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/vedaai/web

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - vedaai-web
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/vedaai/web:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
      - --quiet

substitutions:
  _API_URL: https://vedaai-api-439420707140.asia-south1.run.app

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/vedaai/web:$SHORT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/vedaai/web:latest

options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
